name: Deploy to Firebase Hosting
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Rewrite URLs for Firebase host
        env:
          FIREBASE_SITE_URL: ${{ vars.FIREBASE_SITE_URL }}
        run: |
          if [ -z "$FIREBASE_SITE_URL" ]; then
            echo "Set the FIREBASE_SITE_URL repository variable to your custom domain, for example https://example.com"
            exit 1
          fi

          FIREBASE_SITE_URL="${FIREBASE_SITE_URL%/}"
          find . -path '*/.*' -prune -o -type f \( -name "*.html" -o -name "*.xml" -o -name "*.txt" \) -exec perl -pi -e 's#https://bikram-agarwal\.github\.io#$ENV{FIREBASE_SITE_URL}#g' {} +

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.GCP_SA_KEY }}
          projectId: bikram-101
          channelId: live
